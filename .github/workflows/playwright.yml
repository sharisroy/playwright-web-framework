name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Deploy the report straight to GitHub Pages (Settings -> Pages -> Source: GitHub Actions).
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one Pages deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test

    # ---------- Reporting (runs even if tests fail) ----------
    - name: Upload Playwright HTML report (downloadable artifact)
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Set up Java (required by the Allure CLI)
      uses: actions/setup-java@v4
      if: ${{ !cancelled() }}
      with:
        distribution: temurin
        java-version: '17'

    # Carry Allure history across runs via the cache (so trends accumulate).
    - name: Restore Allure history
      uses: actions/cache@v4
      if: ${{ !cancelled() }}
      with:
        path: allure-history
        key: allure-history-${{ github.run_id }}
        restore-keys: allure-history-

    - name: Generate Allure report (with history)
      if: ${{ !cancelled() }}
      run: |
        if [ -d allure-history ]; then
          mkdir -p allure-results/history
          cp -r allure-history/. allure-results/history/ 2>/dev/null || true
        fi
        npx allure generate allure-results --clean -o allure-report
        rm -rf allure-history
        cp -r allure-report/history allure-history

    - name: Upload report as a Pages artifact
      uses: actions/upload-pages-artifact@v3
      if: ${{ !cancelled() && github.event_name == 'push' }}
      with:
        path: allure-report

  # Publish the report to GitHub Pages (push events only; runs even if tests failed).
  deploy:
    needs: test
    if: ${{ !cancelled() && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
