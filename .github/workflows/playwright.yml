name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Needed so the Allure report can be pushed to the gh-pages branch.
permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test

    # ---------- Reporting (runs even if tests fail) ----------
    - name: Upload Playwright HTML report (downloadable artifact)
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Set up Java (required by the Allure CLI)
      uses: actions/setup-java@v4
      if: ${{ !cancelled() }}
      with:
        distribution: temurin
        java-version: '17'

    # Pull the previously published report so Allure trends carry across runs.
    - name: Load previous Allure report
      uses: actions/checkout@v4
      if: ${{ !cancelled() }}
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Generate Allure report (with history)
      if: ${{ !cancelled() }}
      run: |
        if [ -d gh-pages/history ]; then
          mkdir -p allure-results/history
          cp -r gh-pages/history/. allure-results/history/
        fi
        npx allure generate allure-results --clean -o allure-report

    # Publish only on pushes to the default branch (PRs from forks can't push).
    - name: Publish Allure report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: ${{ !cancelled() && github.event_name == 'push' }}
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-report
