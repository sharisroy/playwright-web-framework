name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Needed so the Allure report can be pushed to the gh-pages branch.
permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test

    # ---------- Reporting (runs even if tests fail) ----------
    - name: Upload Playwright HTML report (downloadable artifact)
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    # Pull the previous report so Allure can show history/trends across runs.
    - name: Load Allure history
      uses: actions/checkout@v4
      if: ${{ !cancelled() }}
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Build Allure report (with history)
      uses: simple-elf/allure-report-action@master
      if: ${{ !cancelled() }}
      with:
        allure_results: allure-results
        gh_pages: gh-pages
        allure_report: allure-report
        allure_history: allure-history
        keep_reports: 20

    # Publish only on pushes to the default branch (PRs from forks can't push).
    - name: Publish Allure report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: ${{ !cancelled() && github.event_name == 'push' }}
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history
